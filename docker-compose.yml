version: '3.8'
services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: hajimi
      POSTGRES_PASSWORD: hajimi
      POSTGRES_DB: memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hajimi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
