name = "solarized"
description = "Solarized theme - colorblind friendly palette"
version = "1.0.0"

[colors]
# Core UI colors (Solarized base03/base0)
background = "#002b36"
foreground = "#839496"
primary = "#268bd2"

# Status colors
success = "#859900"
error = "#dc322f"
warning = "#b58900"

# Secondary colors
muted = "#586e75"
border = "#073642"
selection = "#073642"
hover = "#094453"

# Syntax highlighting (Solarized accents)
keyword = "#cb4b16"
string = "#2aa198"
number = "#d33682"
comment = "#93a1a1"
function = "#6c71c4"
variable = "#eee8d5"

# Diagnostic colors (Week 19)
editorError = "#dc322f"
editorWarning = "#b58900"
editorInfo = "#268bd2"
