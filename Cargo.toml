[workspace]
members = ["crates/evm-bench-adapter", "crates/codex-twist"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Hajimi Team"]
license = "MIT"
repository = "https://github.com/hajimi/evm-bench-adapter"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
