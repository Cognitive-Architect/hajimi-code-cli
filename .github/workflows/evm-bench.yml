name: EVM Bench CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.93.1'
  FOUNDRY_VERSION: 'nightly'

jobs:
  # TypeScript单元测试
  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: TypeScript compile check
        run: npx tsc --noEmit
      
      - name: Run unit tests
        run: npm test
        env:
          CI: true

  # Rust单元测试
  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry ~/.cargo/git target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check Rust code
        run: cargo check --manifest-path crates/evm-bench-adapter/Cargo.toml
      
      - name: Run Rust tests
        run: cargo test --manifest-path crates/evm-bench-adapter/Cargo.toml

  # 集成测试（需要Anvil）
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    services:
      anvil:
        image: ghcr.io/foundry-rs/foundry:${{ env.FOUNDRY_VERSION }}
        ports: ['8545:8545']
        options: --entrypoint anvil
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup Foundry/Anvil
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Rust release
        run: cargo build --manifest-path crates/evm-bench-adapter/Cargo.toml --release
      
      - name: Run integration tests
        run: npm run test:integration
        env:
          ANVIL_ENDPOINT: http://localhost:8545
          CI: true

  # 基准测试（仅在main分支）
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run full benchmark
        run: npm run bench:full
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: bench-results
          path: reports/
