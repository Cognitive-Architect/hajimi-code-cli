<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hajimi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="session-title" id="sessionTitle">Untitled</div>
      <div class="topbar-actions">
        <button class="icon-btn" title="History" id="historyBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="icon-btn" title="New session" id="newSessionBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome" id="welcomeScreen">
        <div class="logo">Hajimi</div>
        <div class="mascot">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="12" y="12" width="40" height="40" rx="4" fill="#d4a574"/>
            <rect x="20" y="22" width="8" height="8" rx="1" fill="#1e1e1e"/>
            <rect x="36" y="22" width="8" height="8" rx="1" fill="#1e1e1e"/>
            <rect x="24" y="38" width="16" height="4" rx="1" fill="#1e1e1e"/>
            <rect x="16" y="44" width="6" height="8" rx="1" fill="#d4a574"/>
            <rect x="42" y="44" width="6" height="8" rx="1" fill="#d4a574"/>
          </svg>
        </div>
        <p class="welcome-text">Local-first AI agent. Ask me to read files, run tests, or edit code.</p>
      </div>
    </main>

    <div class="input-dock">
      <div class="input-toolbar">
        <button class="toolbar-btn" id="addContextBtn" title="Add context">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="toolbar-btn" id="editModeBtn" title="Edit mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      <div class="input-row">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Ask Hajimi..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">
        <span class="hint-key">Ctrl</span> + <span class="hint-key">Enter</span> to send
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
