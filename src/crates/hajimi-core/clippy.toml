# HAJIMI Core - Clippy Configuration
# 债务预防加固配置

# 允许测试代码使用 unwrap 和 expect
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# 禁止在常量中使用 unwrap/expect（生产代码应处理错误）
allow-unwrap-in-consts = false
allow-expect-in-consts = false

# 禁止在测试中 panic（可选，保持测试可控）
# allow-panic-in-tests = false

# 认知复杂度阈值（防止函数过于复杂）
cognitive-complexity-threshold = 25

# 数组大小阈值
array-size-threshold = 512000

# 文档标识符检查
doc-valid-idents = ["HAJIMI", "QueryEngine", "StreamChunk", "CI/CD"]

# 未来可启用：禁止特定宏或方法
# disallowed-methods = [
#     { path = "std::option::Option::unwrap", reason = "使用 expect 并说明原因，或改用 match 处理" },
# ]

# 算术副作用检查（可选）
# arithmetic-side-effects-allowed = ["usize", "u64", "i64"]
